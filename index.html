<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>중마고등학교 교문지도 체크 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0f13;--bg2:#16181f;--bg3:#1e2028;--bg4:#11131a;--border:#2a2d38;--border2:#383c4a;
  --green:#39ff7e;--green-dim:#1a7a3d;--green-soft:rgba(57,255,126,.1);--green-glow:0 0 18px rgba(57,255,126,.35);
  --amber:#ffb830;--amber-soft:rgba(255,184,48,.1);--red:#ff4757;--red-soft:rgba(255,71,87,.1);--blue:#4a9eff;--blue-soft:rgba(74,158,255,.1);
  --purple:#b38cff;--purple-soft:rgba(179,140,255,.1);--text:#e8ecf4;--text-dim:#6b7280;--text-mid:#9ca3af;
  --mono:'Share Tech Mono',monospace;--sans:'Noto Sans KR',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{font-family:var(--sans);background:radial-gradient(circle at 50% -20%,rgba(57,255,126,.08),transparent 35%),var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-text-size-adjust:100%}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px)}
button,input{font-family:inherit}
.status-bar{background:rgba(22,24,31,.96);border-bottom:1px solid var(--border);padding:.45rem 1.5rem;display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:.72rem;color:var(--text-dim);position:relative;z-index:60}
.status-bar .left{display:flex;gap:1rem;align-items:center;min-width:0}.ping{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:var(--green-glow);animation:blink 2s ease-in-out infinite}.live{color:var(--green);font-weight:700;letter-spacing:.1em}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
header{background:rgba(22,24,31,.96);border-bottom:2px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
.logo-wrap{display:flex;align-items:center;gap:.9rem;min-width:0}.logo-mark{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;background:rgba(57,255,126,.08);border:1.5px solid rgba(57,255,126,.55);box-shadow:var(--green-glow);overflow:hidden}.school-mark-img{width:38px;height:38px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(57,255,126,.55))}.logo-mark::after{content:"";position:absolute}.logo-mark{position:relative}
.logo-text{font-family:'Black Han Sans',var(--sans);font-size:1.3rem;color:var(--text);letter-spacing:.04em;white-space:nowrap}.logo-text span{color:var(--green)}.school-sub{font-size:.78rem;color:var(--amber);font-weight:900;letter-spacing:.08em;margin-bottom:1px}
.header-right{display:flex;align-items:center;gap:1rem}.hdr-badge{font-family:var(--mono);font-size:.72rem;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;color:var(--text-mid)}#clock{font-family:var(--mono);font-size:1rem;color:var(--amber);letter-spacing:.1em;white-space:nowrap}
.page{width:min(100% - 2rem,1100px);margin:0 auto;padding:1.35rem 0 4rem}.top-message{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1rem 1.2rem;margin-bottom:1rem;display:none;color:var(--text-mid);line-height:1.6}.top-message.show{display:block}.top-message.error{border-color:var(--red);background:rgba(255,71,87,.06);color:#ffd0d5}.layout{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(350px,.95fr);gap:1rem;align-items:start}.side{display:grid;gap:1rem}
.progress-strip{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.8rem 1.2rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem}.prog-bar-wrap{flex:1;background:var(--bg3);border-radius:4px;height:6px;overflow:hidden}.prog-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green-dim),var(--green));box-shadow:var(--green-glow);transition:width .25s ease}.prog-label{font-family:var(--mono);font-size:.75rem;color:var(--green);white-space:nowrap}.prog-title{font-size:.8rem;color:var(--text-dim);white-space:nowrap;font-weight:800}
.panel{background:rgba(22,24,31,.98);border:1px solid var(--border);border-radius:14px;overflow:visible;box-shadow:0 18px 40px rgba(0,0,0,.22);animation:slideIn .35s ease both}.panel-inner{padding:1.1rem 1.2rem}.panel-header{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 1.2rem;border-bottom:1px solid var(--border)}.panel h2{font-size:1.08rem;font-weight:900;color:var(--text);letter-spacing:.02em}.kicker{font-family:var(--mono);font-size:.68rem;font-weight:900;color:var(--green);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.25rem}.kicker.orange{color:var(--amber)}@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.step-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:1rem;overflow:visible;transition:border-color .2s}.step-card.ready{border-color:var(--green-dim)}.step-card.active{border-color:var(--green);box-shadow:0 0 0 1px rgba(57,255,126,.12)}.step-head{display:flex;align-items:center;gap:.8rem;padding:.9rem 1.2rem;border-bottom:1px solid var(--border);user-select:none}.step-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-family:var(--mono);font-size:.75rem;font-weight:700;background:var(--bg3);border:1.5px solid var(--border2);color:var(--text-dim);transition:all .2s}.step-card.ready .step-num,.step-card.active .step-num{background:var(--green);border-color:var(--green);color:var(--bg);box-shadow:var(--green-glow)}.step-label{font-size:.92rem;font-weight:900;color:var(--text);flex:1;letter-spacing:.02em}.step-value{font-family:var(--mono);font-size:.8rem;color:var(--green);background:rgba(57,255,126,.08);border-radius:5px;padding:2px 8px;letter-spacing:.04em}.step-body{padding:1.1rem 1.2rem}.info-tag{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--mono);font-size:.72rem;color:var(--text-dim);letter-spacing:.04em;margin-bottom:.8rem}.info-tag::before{content:'//';color:var(--green)}
.btn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}.class-grid{grid-template-columns:repeat(4,1fr)}.sel-btn,.item-btn{padding:.78rem .5rem;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;color:var(--text-mid);font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;position:relative;overflow:hidden}.sel-btn::before,.item-btn::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(57,255,126,.15) 0%,transparent 70%);opacity:0;transition:opacity .2s}.sel-btn:hover,.item-btn:hover{border-color:var(--green);color:var(--text)}.sel-btn:hover::before,.item-btn:hover::before{opacity:1}.sel-btn.active{background:var(--green-soft);border-color:var(--green);color:var(--green);box-shadow:var(--green-glow);font-weight:900}.sel-btn.active::before{opacity:1}
.student-select-wrap{position:relative}.student-select{width:100%;min-height:48px;padding:.78rem 3rem .78rem 1rem;background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;color:var(--text);font-size:.95rem;font-weight:800;outline:none;transition:all .2s;appearance:none;-webkit-appearance:none;cursor:pointer}.student-select:focus{border-color:var(--green);box-shadow:var(--green-glow)}.student-select:disabled{opacity:.6;cursor:not-allowed;color:var(--text-dim)}.student-select-wrap::after{content:'▼';position:absolute;right:1rem;top:50%;transform:translateY(-50%);font-size:.8rem;color:var(--green);pointer-events:none}.student-select option{background:var(--bg2);color:var(--text);font-weight:700;padding:.7rem}.student-select option:disabled{color:var(--text-dim)}
.check-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem}.check-item{background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;padding:1rem .6rem;cursor:pointer;transition:all .18s;user-select:none;display:flex;flex-direction:column;align-items:center;gap:.45rem;text-align:center;position:relative;overflow:hidden;min-height:112px}.check-item::after{content:'';position:absolute;inset:0;border-radius:12px;opacity:0;transition:opacity .2s;background:radial-gradient(circle at 50% 30%,rgba(57,255,126,.12),transparent 70%)}.check-item:hover{transform:translateY(-2px)}.check-item:hover::after{opacity:1}.check-item.checked{background:var(--green-soft);border-color:var(--green);box-shadow:0 0 16px rgba(57,255,126,.2)}.check-item.late.checked{background:var(--red-soft);border-color:var(--red);box-shadow:0 0 16px rgba(255,71,87,.2)}.check-item.elevator.checked{background:var(--blue-soft);border-color:var(--blue);box-shadow:0 0 16px rgba(74,158,255,.2)}.check-emoji{font-size:1.8rem;line-height:1}.check-label{font-size:.92rem;font-weight:900;color:var(--text-mid)}.check-sub{font-size:.72rem;color:var(--text-dim)}.check-tick{position:absolute;top:.5rem;right:.6rem;font-size:.75rem;color:var(--green);opacity:0}.check-item.checked .check-tick{opacity:1}.check-item.checked .check-label{color:var(--green)}.check-item.late.checked .check-label{color:var(--red)}.check-item.elevator.checked .check-label{color:var(--blue)}
.summary-panel{background:var(--bg2);border:1px solid var(--green-dim);border-radius:14px;padding:1.1rem 1.2rem;margin-bottom:1rem;display:none}.summary-panel.show{display:block}.summary-title{font-family:var(--mono);font-size:.72rem;color:var(--green);letter-spacing:.15em;margin-bottom:1rem;text-transform:uppercase}.summary-rows{display:grid;gap:.5rem}.summary-row{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:.55rem .8rem;background:var(--bg3);border-radius:8px}.summary-row .s-label{font-size:.82rem;color:var(--text-dim);white-space:nowrap}.summary-row .s-val{font-family:var(--mono);font-size:.85rem;color:var(--green);font-weight:900;text-align:right}.summary-row .s-val.amber{color:var(--amber)}
.submit-btn{width:100%;padding:1rem;background:var(--green);color:var(--bg);border:none;border-radius:12px;font-family:'Black Han Sans',var(--sans);font-size:1.15rem;letter-spacing:.08em;cursor:pointer;box-shadow:var(--green-glow);transition:all .2s;position:relative;overflow:hidden}.submit-btn:disabled{opacity:.55;cursor:wait;filter:grayscale(.4)}.submit-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transform:translateX(-100%);transition:transform .4s}.submit-btn:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(57,255,126,.5)}.submit-btn:hover::before{transform:translateX(100%)}.reset-btn{width:100%;padding:.75rem;background:transparent;color:var(--text-dim);border:1.5px solid var(--border2);border-radius:10px;font-size:.88rem;font-weight:800;cursor:pointer;transition:all .2s;margin-top:.7rem}.reset-btn:hover{border-color:var(--red);color:var(--red)}
.recent-head,.recent-row{display:grid;grid-template-columns:58px minmax(0,1.2fr) minmax(120px,1fr) 62px;gap:8px;align-items:center}.recent-head{padding:1rem 1.2rem .5rem;color:var(--text-dim);font-size:.78rem;font-weight:900}.recent-list,.monthly-list{display:flex;flex-direction:column;gap:.55rem;padding:1rem 1.2rem 1.2rem}.recent-row{padding:.75rem;background:var(--bg3);border:1px solid var(--border2);border-radius:12px}.recent-row time{font-family:var(--mono);font-weight:900;color:var(--amber)}.student-info{font-weight:900;color:var(--text)}.tags{display:flex;flex-wrap:wrap;gap:6px}.tag{display:inline-flex;border-radius:999px;padding:5px 8px;font-size:.72rem;font-weight:900}.clothes{background:rgba(57,255,126,.12);color:var(--green)}.lateTag{background:rgba(255,71,87,.12);color:var(--red)}.elevatorTag{background:rgba(74,158,255,.12);color:var(--blue)}.delete{border:1px solid rgba(255,71,87,.5);border-radius:999px;background:rgba(255,71,87,.07);color:#ff8b94;min-height:34px;font-size:.78rem;font-weight:900;cursor:pointer}.delete:hover{background:rgba(255,71,87,.15);color:#fff}
.monthly-panel-header{align-items:center}.month-select{position:relative;min-width:178px;z-index:20}.month-trigger{width:100%;background:var(--bg3);border:1.5px solid var(--border2);color:var(--text);border-radius:12px;padding:.7rem .85rem;font-weight:900;display:flex;align-items:center;justify-content:space-between;gap:.65rem;cursor:pointer;min-height:44px}.month-trigger .arrow{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:var(--green);color:var(--bg);font-weight:900}.month-select.open .arrow{transform:rotate(180deg)}.month-menu{display:none;position:absolute;right:0;top:calc(100% + 8px);width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:.45rem;box-shadow:0 18px 40px rgba(0,0,0,.4);max-height:220px;overflow:auto}.month-select.open .month-menu{display:grid;gap:.35rem}.month-option{background:transparent;border:0;color:var(--text-mid);border-radius:10px;padding:.75rem .8rem;text-align:left;font-weight:900;cursor:pointer}.month-option:hover,.month-option.selected{background:var(--green-soft);color:var(--green)}.monthly-student{display:grid;grid-template-columns:44px 1fr auto;gap:.7rem;align-items:center;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:.75rem}.avatar{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:var(--green-soft);border:1px solid var(--green-dim);color:var(--green);font-weight:900}.monthly-student strong{display:block;color:var(--text);font-weight:900}.monthly-student span{display:block;color:var(--text-mid);font-size:.82rem;margin-top:2px}.monthly-student b{color:var(--amber);font-family:var(--mono);font-size:.92rem}.details{grid-column:2/4;color:var(--text-dim);font-size:.78rem;background:var(--bg4);border-radius:8px;padding:.45rem .55rem}.empty{background:var(--bg3);border:1px dashed var(--border2);color:var(--text-dim);border-radius:12px;padding:1rem;line-height:1.5;text-align:center;font-weight:800}
.footer{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:1.5rem;color:var(--text-dim);font-weight:900}.footer .mini-logo{display:none}.mini-school-mark{width:26px;height:26px;object-fit:contain;filter:drop-shadow(0 0 7px rgba(57,255,126,.45));opacity:.92}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg2);border:1px solid var(--green);border-radius:10px;padding:.65rem 1.2rem;font-family:var(--mono);font-size:.82rem;color:var(--green);box-shadow:var(--green-glow);z-index:300;transition:transform .3s ease;white-space:nowrap;max-width:calc(100% - 2rem);overflow:hidden;text-overflow:ellipsis}.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:920px){.layout{grid-template-columns:1fr}.page{width:min(100% - 1rem,680px)}}
@media(max-width:560px){.status-bar{padding:.42rem .75rem}.status-bar .left span:last-child{display:none}header{padding:.85rem .85rem}.school-sub{font-size:.68rem}.logo-text{font-size:1.08rem}.logo-mark{width:42px;height:42px}.school-mark-img{width:34px;height:34px}.hdr-badge{display:none}#clock{font-size:.86rem}.page{width:100%;padding:.8rem .72rem 4rem}.progress-strip{padding:.75rem .8rem}.panel{border-radius:14px}.panel-header{padding:.95rem 1rem}.panel-inner{padding:1rem}.step-head{padding:.85rem 1rem}.step-body{padding:1rem}.btn-grid{grid-template-columns:repeat(3,1fr)}.class-grid{grid-template-columns:repeat(4,1fr)}.check-grid{grid-template-columns:repeat(3,1fr);gap:.45rem}.check-item{min-height:72px;padding:.7rem .25rem}.check-emoji{font-size:1.25rem}.check-label{font-size:.82rem}.check-sub{display:none}.summary-row{align-items:flex-start;flex-direction:column;gap:.2rem}.summary-row .s-val{text-align:left}.recent-head{display:none}.recent-list,.monthly-list{padding:1rem 1rem 1rem}.recent-row{grid-template-columns:52px minmax(0,1fr) 58px;gap:8px}.recent-row .tags{grid-column:2/3}.recent-row .delete{grid-column:3/4;grid-row:1/3}.monthly-panel-header{display:flex;flex-direction:row;align-items:center}.month-select{min-width:160px}.month-trigger{padding:.65rem .65rem}.monthly-student{grid-template-columns:38px 1fr auto}.avatar{width:38px;height:38px}.details{grid-column:1/4}}
</style>
</head>

<div class="toast" id="toast"></div>
<script>
const $ = (id) => document.getElementById(id);

/*
  GitHub Pages에 올릴 때 아래 API_URL에 Apps Script 웹앱 URL을 붙여넣으세요.
  예: https://script.google.com/macros/s/배포ID/exec
*/
const API_URL = 'https://script.google.com/macros/s/AKfycbzKhkH_yiI5MtPNAn5PQgKhRfKq4N6t4x4KrS3H9U-PPnFu3HEvWqIW80G9T4jfPKHR/exec';
const API_TOKEN = '';

const state = { roster:{}, selectedGrade:null, selectedClass:null, selectedStudent:null, selectedItems:new Set(), selectedMonth:'' };
const refs = {};
window.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', applyResponsiveMode);
window.addEventListener('orientationchange', () => setTimeout(applyResponsiveMode, 120));
function init(){
  ['gradeButtons','classButtons','studentSelect','itemButtons','recentList','monthlyList','saveBtn','resetBtn','toast','authBox','app','progressFill','progressLabel','summary','monthSelect','monthTrigger','monthMenu','monthText','dateStr'].forEach(k=>refs[k]=$(k));
  tick(); setInterval(tick,1000); buildGradeButtons(); buildClassButtons(); bindEvents(); applyResponsiveMode(); loadInitialData(0);
}
function tick(){ const now=new Date(); const days=['일','월','화','수','목','금','토']; if($('clock')) $('clock').textContent=now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}); if($('dateStr')) $('dateStr').textContent=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} (${days[now.getDay()]})`; if($('sumTime') && state.selectedStudent && state.selectedItems.size) $('sumTime').textContent=now.toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }

function isApiReady(){ return API_URL && !API_URL.includes('여기에_Apps_Script_웹앱_URL'); }
function apiCall(action, payload={}){
  if(!isApiReady()) return Promise.reject(new Error('index.html 상단의 API_URL에 Apps Script 웹앱 URL을 입력해야 합니다.'));
  return new Promise((resolve,reject)=>{
    const callback='jmGateApi_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const script=document.createElement('script');
    const timer=setTimeout(()=>{ cleanup(); reject(new Error('서버 응답 시간이 초과되었습니다. Apps Script 배포 URL을 확인하세요.')); },15000);
    function cleanup(){ clearTimeout(timer); try{ delete window[callback]; }catch(e){ window[callback]=undefined; } if(script.parentNode) script.parentNode.removeChild(script); }
    window[callback]=(res)=>{ cleanup(); resolve(res); };
    const url=new URL(API_URL);
    url.searchParams.set('action',action);
    url.searchParams.set('callback',callback);
    if(API_TOKEN) url.searchParams.set('token',API_TOKEN);
    url.searchParams.set('data',JSON.stringify(payload||{}));
    script.onerror=()=>{ cleanup(); reject(new Error('Apps Script 웹앱에 연결하지 못했습니다. 배포 URL과 접근 권한을 확인하세요.')); };
    script.src=url.toString();
    document.body.appendChild(script);
  });
}

function loadInitialData(retry){
  showStatus(retry ? `데이터를 다시 불러오는 중입니다. (${retry+1}/3)` : '데이터를 불러오는 중입니다.');
  apiCall('getInitialData').then(res=>{
    if(res && res.todayText) refs.dateStr.textContent=res.todayText;
    if(!res || !res.ok){ showStatus((res&&res.message)?res.message:'접근 권한을 확인할 수 없습니다.',true); return; }
    state.roster=res.roster||{}; state.selectedMonth=res.currentMonth||''; renderDashboard(res); refreshStudents(); refs.authBox.classList.remove('show','error'); refs.app.style.display=''; updateProgress(); setTimeout(applyResponsiveMode,0);
  }).catch(err=>{ if(retry<2){ setTimeout(()=>loadInitialData(retry+1),800); return; } showStatus((err&&err.message)?err.message:'초기 데이터를 불러오지 못했습니다.',true); });
}
function showStatus(msg,error=false){ refs.authBox.textContent=msg; refs.authBox.className='top-message show'+(error?' error':''); }
function buildGradeButtons(){ refs.gradeButtons.innerHTML=[1,2,3].map(g=>`<button type="button" class="sel-btn" data-grade="${g}">${g}학년</button>`).join(''); refs.gradeButtons.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{ state.selectedGrade=btn.dataset.grade; state.selectedStudent=null; setActive(refs.gradeButtons,btn); $('gradeValue').textContent=btn.textContent; $('gradeValue').style.display=''; refreshStudents(); updateProgress(); showToast(btn.textContent+' 선택됨'); })); }
function buildClassButtons(){ refs.classButtons.innerHTML=[1,2,3,4,5,6,7].map(c=>`<button type="button" class="sel-btn" data-class="${c}">${c}반</button>`).join(''); refs.classButtons.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{ state.selectedClass=btn.dataset.class; state.selectedStudent=null; setActive(refs.classButtons,btn); $('classValue').textContent=btn.textContent; $('classValue').style.display=''; refreshStudents(); updateProgress(); showToast(btn.textContent+' 선택됨'); })); }
function bindEvents(){ refs.studentSelect.addEventListener('change',()=>{ const opt=refs.studentSelect.options[refs.studentSelect.selectedIndex]; if(!refs.studentSelect.value){ state.selectedStudent=null; $('studentValue').style.display='none'; updateProgress(); return; } state.selectedStudent={number:opt.dataset.number,name:opt.dataset.name}; $('studentValue').textContent=`${opt.dataset.number}번 ${opt.dataset.name}`; $('studentValue').style.display=''; updateProgress(); }); refs.itemButtons.querySelectorAll('.check-item').forEach(el=>el.addEventListener('click',()=>{ const item=el.dataset.item; if(state.selectedItems.has(item)) state.selectedItems.delete(item); else state.selectedItems.add(item); el.classList.toggle('checked',state.selectedItems.has(item)); $('checkValue').textContent=Array.from(state.selectedItems).join(' · '); $('checkValue').style.display=state.selectedItems.size?'':'none'; updateProgress(); })); refs.saveBtn.addEventListener('click',saveRecord); refs.resetBtn.addEventListener('click',clearAfterSave); refs.monthTrigger.addEventListener('click',e=>{e.stopPropagation(); refs.monthSelect.classList.toggle('open');}); document.addEventListener('click',e=>{ if(!refs.monthSelect.contains(e.target)) refs.monthSelect.classList.remove('open'); }); }
function refreshStudents(){ const select=refs.studentSelect; select.innerHTML=''; state.selectedStudent=null; $('studentValue').style.display='none'; if(!state.selectedGrade||!state.selectedClass){ select.disabled=true; select.innerHTML='<option value="">학년과 반을 먼저 선택하세요</option>'; return; } const key=`${state.selectedGrade}-${state.selectedClass}`; const list=state.roster[key]||[]; select.disabled=false; if(!list.length){ select.innerHTML='<option value="">등록된 학생이 없습니다</option>'; return; } select.innerHTML='<option value="">학생 선택</option>'+list.map(s=>`<option value="${escapeHtml(s.number)}|${escapeHtml(s.name)}" data-number="${escapeHtml(s.number)}" data-name="${escapeHtml(s.name)}">${escapeHtml(s.number)}번 ${escapeHtml(s.name)}</option>`).join(''); }
function updateProgress(){ const done=[state.selectedGrade,state.selectedClass,state.selectedStudent,state.selectedItems.size>0].filter(Boolean).length; refs.progressFill.style.width=(done/4*100)+'%'; refs.progressLabel.textContent=done+' / 4'; ['grade','class','student','check'].forEach((k,i)=>{ const card=$('card-'+k); const ok=[state.selectedGrade,state.selectedClass,state.selectedStudent,state.selectedItems.size>0][i]; card.classList.toggle('ready',!!ok); card.classList.toggle('active',!ok && (i===0 || [state.selectedGrade,state.selectedClass,state.selectedStudent][i-1])); }); const ready=state.selectedGrade&&state.selectedClass&&state.selectedStudent&&state.selectedItems.size; refs.summary.classList.toggle('show',!!ready); if(ready){ $('sumStudent').textContent=`${state.selectedGrade}학년 ${state.selectedClass}반 ${state.selectedStudent.number}번 ${state.selectedStudent.name}`; $('sumItems').textContent=Array.from(state.selectedItems).join(' · '); tick(); } }
function setActive(container, selected){ container.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b===selected)); }
function saveRecord(){ if(!state.selectedGrade||!state.selectedClass||!state.selectedStudent) return showToast('학년, 반, 학생을 선택하세요.'); if(!state.selectedItems.size) return showToast('점검 항목을 1개 이상 선택하세요.'); refs.saveBtn.disabled=true; refs.saveBtn.textContent='저장 중...'; const payload={grade:state.selectedGrade,classNo:state.selectedClass,number:state.selectedStudent.number,name:state.selectedStudent.name,items:Array.from(state.selectedItems)}; apiCall('saveRecord',payload).then(res=>{ refs.saveBtn.disabled=false; refs.saveBtn.textContent='⚡ 지도 기록 제출'; if(!res||!res.ok) return showToast((res&&res.message)||'저장하지 못했습니다.'); showToast(res.message||'저장되었습니다.'); renderDashboard(res); clearAfterSave(false); }).catch(err=>{ refs.saveBtn.disabled=false; refs.saveBtn.textContent='⚡ 지도 기록 제출'; onFailure(err); }); }
function clearAfterSave(show=true){ state.selectedStudent=null; state.selectedItems.clear(); refs.studentSelect.value=''; refs.itemButtons.querySelectorAll('.check-item').forEach(el=>el.classList.remove('checked')); $('studentValue').style.display='none'; $('checkValue').style.display='none'; refreshStudents(); updateProgress(); if(show) showToast('선택을 초기화했습니다.'); }
function renderDashboard(res){ if(!res) return; if(res.currentMonth) state.selectedMonth=res.currentMonth; renderMonths(res.months||[]); renderRecent(res.recent||[]); renderMonthly(res.monthly||[]); }
function renderMonths(months){ const clean=(months||[]).filter(m=>m&&/^\d{4}-\d{2}$/.test(String(m.value||''))&&m.label); refs.monthMenu.innerHTML=clean.map(m=>`<button type="button" class="month-option ${m.value===state.selectedMonth?'selected':''}" data-month="${escapeHtml(m.value)}" data-label="${escapeHtml(m.label)}">${escapeHtml(m.label)}</button>`).join(''); const current=clean.find(m=>m.value===state.selectedMonth)||clean[0]; if(current){ state.selectedMonth=current.value; refs.monthText.textContent=current.label; } refs.monthMenu.querySelectorAll('.month-option').forEach(btn=>btn.addEventListener('click',()=>{ state.selectedMonth=btn.dataset.month; refs.monthText.textContent=btn.dataset.label||btn.textContent.trim(); refs.monthSelect.classList.remove('open'); apiCall('getMonthlySummary',{month:state.selectedMonth}).then(res=>{ if(res&&res.ok) renderDashboard(res); else showToast((res&&res.message)||'월별 자료를 불러오지 못했습니다.'); }).catch(onFailure); })); }
function renderRecent(rows){ rows=Array.isArray(rows)?rows:[]; if(!rows.length){ refs.recentList.innerHTML='<div class="empty">최근 입력 기록이 없습니다.</div>'; return; } refs.recentList.innerHTML=rows.map(r=>`<div class="recent-row"><time>${escapeHtml(r.time||'')}</time><div class="student-info">${escapeHtml(r.grade)}학년 ${escapeHtml(r.classNo)}반 ${escapeHtml(r.number)}번 ${escapeHtml(r.name)}</div><div class="tags">${(r.items||[]).map(tagHtml).join('')}</div><button type="button" class="delete" data-row="${escapeHtml(r.rowNumber)}">삭제</button></div>`).join(''); refs.recentList.querySelectorAll('.delete').forEach(btn=>btn.addEventListener('click',()=>{ if(!confirm('이 기록을 삭제할까요?')) return; apiCall('deleteRecord',{rowNumber:btn.dataset.row,selectedMonth:state.selectedMonth}).then(res=>{ if(!res||!res.ok) return showToast((res&&res.message)||'삭제하지 못했습니다.'); showToast(res.message||'삭제되었습니다.'); renderDashboard(res); }).catch(onFailure); })); }
function renderMonthly(rows){ rows=Array.isArray(rows)?rows:[]; if(!rows.length){ refs.monthlyList.innerHTML='<div class="empty">선택한 월에 3회 이상 누적 학생이 없습니다.</div>'; return; } refs.monthlyList.innerHTML=rows.map(r=>`<div class="monthly-student"><div class="avatar">${escapeHtml(String(r.name||'').slice(0,1))}</div><div><strong>${escapeHtml(r.name)}</strong><span>${escapeHtml(r.grade)}학년 ${escapeHtml(r.classNo)}반 ${escapeHtml(r.number)}번</span></div><b>총 ${escapeHtml(r.total)}회</b><div class="details">복장 ${escapeHtml(r.clothes)}회 · 지각 ${escapeHtml(r.late)}회 · 엘리베이터 ${escapeHtml(r.elevator)}회</div></div>`).join(''); }
function tagHtml(item){ const cls=item==='복장'?'clothes':item==='지각'?'lateTag':'elevatorTag'; return `<span class="tag ${cls}">${escapeHtml(item)}</span>`; }
function showToast(msg){ refs.toast.textContent=msg; refs.toast.classList.add('show'); clearTimeout(window.__toastTimer); window.__toastTimer=setTimeout(()=>refs.toast.classList.remove('show'),1800); }
function onFailure(err){ showToast(err&&err.message?err.message:'오류가 발생했습니다.'); }
function applyResponsiveMode(){ const ua=navigator.userAgent||''; const screenMin=Math.min(screen.width||9999,screen.height||9999); const isMobile=/Android|iPhone|iPad|iPod|Mobile|SamsungBrowser/i.test(ua)||screenMin<=820||window.matchMedia('(max-width:820px)').matches; document.documentElement.classList.toggle('mobile-device',isMobile); document.body.classList.toggle('force-mobile',isMobile); }
function escapeHtml(value){ return String(value??'').replace(/[&<>"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
</script>
</body>
</html>
